<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- tile -->
  <rect width="64" height="64" rx="14" fill="#03040a"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none"
        stroke="#00f5ff" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- lattice grid -->
  <g stroke="#00f5ff" stroke-opacity="0.18" stroke-width="1">
    <path d="M16 10V54 M32 10V54 M48 10V54 M10 16H54 M10 32H54 M10 48H54"/>
  </g>

  <!-- spectral carrier peaks -->
  <g filter="url(#glow)">
    <circle cx="32" cy="32" r="5.5" fill="#00f5ff"/>
    <circle cx="16" cy="48" r="3.4" fill="#ff2afc"/>
    <circle cx="48" cy="16" r="3.4" fill="#faff30"/>
    <circle cx="48" cy="48" r="2.6" fill="#ff2afc" fill-opacity="0.9"/>
    <circle cx="16" cy="16" r="2.6" fill="#faff30" fill-opacity="0.9"/>
  </g>
</svg>
